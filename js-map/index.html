<!DOCTYPE html>
<html>

<head>
    <title>Simple Map</title>
    <style>
        #map {
            min-height: 100vh;
            max-width: 100%;
        }
    </style>
</head>

<body>
    <h3>My Google Map</h3>
    <div id="map"></div>
    <script>
        function initMap() {
            var location = { lat: -34.397, lng: 150.644 };
            var map = new google.maps.Map(document.getElementById('map'), {
                zoom: 8,
                center: location
            });
            var marker = new google.maps.Marker({
                position: location,
                map: map
            });
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key="
        async defer></script>
</body>

</html>
