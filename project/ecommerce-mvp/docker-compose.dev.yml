services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce-db-dev
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: ./app/api
      dockerfile: Dockerfile
    container_name: ecommerce-api-dev
    environment:
      DATABASE_URL: postgresql://app:secret@db:5432/app
      PORT: 4000
      NODE_ENV: development
      JWT_SECRET: dev_secret_key_change_me
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - ./app/api:/app
      - api_node_modules:/app/node_modules
    networks:
      - ecommerce-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./app/web
      dockerfile: Dockerfile
    container_name: ecommerce-web-dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./app/web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    networks:
      - ecommerce-network
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  api_node_modules:
  web_node_modules:
  web_next:

networks:
  ecommerce-network:
    driver: bridge
