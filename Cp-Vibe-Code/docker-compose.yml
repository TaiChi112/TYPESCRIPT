version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cp-vibe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cpvibecode
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cp-vibe-network

  redis:
    image: redis:7-alpine
    container_name: cp-vibe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cp-vibe-network

  adminer:
    image: adminer
    container_name: cp-vibe-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - cp-vibe-network
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

networks:
  cp-vibe-network:
    driver: bridge
