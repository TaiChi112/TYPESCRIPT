services:
  db:
    image: postgres:15-alpine
    container_name: uaps_postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: uaps_user
      POSTGRES_PASSWORD: uaps_password
      POSTGRES_DB: uaps_db
    ports:
      - '5432:5432'
    volumes:
      - uaps_db_volume:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U uaps_user -d uaps_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uaps_db_volume:
    driver: local
